<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<div style="width:212px;height:100%;min-height:600px;display:flex;flex-direction:column;background:rgba(16,19,20,0.55);backdrop-filter:blur(12px);border-right:1px solid rgba(255,255,255,0.06);font-family:'Geist',-apple-system,sans-serif;box-sizing:border-box;">
  <div style="display:flex;align-items:center;gap:11px;padding:22px 20px 26px;">
    <div style="width:30px;height:30px;border-radius:10px;background:linear-gradient(140deg,#5fe3a1,#3fb985);color:#062417;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 16px rgba(95,227,161,0.4);">m</div>
    <span style="color:#f2f5f3;font-weight:700;font-size:17px;letter-spacing:-0.02em;">microset</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;padding:0 14px;">
    <sc-for list="{{ items }}" as="item" hint-placeholder-count="6">
      <div style="{{ item.rowStyle }}">
        <span style="display:flex;align-items:center;justify-content:center;width:18px;height:18px;flex:none;">{{ item.iconEl }}</span>
        <span style="{{ item.labelStyle }}">{{ item.label }}</span>
      </div>
    </sc-for>
  </div>
  <div style="flex:1;"></div>
  <div style="display:flex;flex-direction:column;gap:4px;padding:0 14px 20px;">
    <div style="{{ ajustesRow }}">
      <span style="display:flex;align-items:center;justify-content:center;width:18px;height:18px;flex:none;">{{ ajustesIcon }}</span>
      <span style="{{ ajustesLabel }}">Ajustes</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:11px;color:#7e8684;font-size:14.5px;cursor:pointer;">
      <span style="display:flex;align-items:center;justify-content:center;width:18px;height:18px;flex:none;">{{ themeIcon }}</span>
      <span>Tema claro</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:212,&quot;height&quot;:640},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;coach&quot;,&quot;hoy&quot;,&quot;rutina&quot;,&quot;semana&quot;,&quot;equipo&quot;,&quot;progreso&quot;,&quot;ajustes&quot;],&quot;default&quot;:&quot;hoy&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const accent = '#5fe3a1';
    const dim = '#7e8684';
    const hi = '#f2f5f3';
    function ic(kids, stroke) {
      return React.createElement('svg', { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none', stroke: stroke, strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round' }, kids);
    }
    const e = React.createElement;
    const glyph = {
      coach: (s) => ic([e('path', { key: 1, d: 'M12 3.2l1.7 7.1 7.1 1.7-7.1 1.7L12 20.8l-1.7-7.1L3.2 12l7.1-1.7z' })], s),
      hoy: (s) => ic([e('polyline', { key: 1, points: '3,12 7,12 9.5,5 14,19 16.5,12 21,12' })], s),
      rutina: (s) => ic([
        e('line', { key: 1, x1: 9, y1: 6, x2: 20, y2: 6 }),
        e('line', { key: 2, x1: 9, y1: 12, x2: 20, y2: 12 }),
        e('line', { key: 3, x1: 9, y1: 18, x2: 20, y2: 18 }),
        e('polyline', { key: 4, points: '3,6 4.3,7.3 6.2,5' }),
        e('polyline', { key: 5, points: '3,12 4.3,13.3 6.2,11' }),
        e('polyline', { key: 6, points: '3,18 4.3,19.3 6.2,17' })
      ], s),
      semana: (s) => ic([
        e('rect', { key: 1, x: 3.5, y: 5, width: 17, height: 16, rx: 2.5 }),
        e('line', { key: 2, x1: 3.5, y1: 9.5, x2: 20.5, y2: 9.5 }),
        e('line', { key: 3, x1: 8, y1: 3, x2: 8, y2: 6 }),
        e('line', { key: 4, x1: 16, y1: 3, x2: 16, y2: 6 })
      ], s),
      equipo: (s) => ic([e('polygon', { key: 1, points: '12,3 19,7.5 19,16.5 12,21 5,16.5 5,7.5' })], s),
      progreso: (s) => ic([
        e('polyline', { key: 1, points: '3,17 9,11 13,15 21,7' }),
        e('polyline', { key: 2, points: '15,7 21,7 21,13' })
      ], s),
      ajustes: (s) => ic([
        e('line', { key: 1, x1: 4, y1: 7, x2: 20, y2: 7 }),
        e('line', { key: 2, x1: 4, y1: 12, x2: 20, y2: 12 }),
        e('line', { key: 3, x1: 4, y1: 17, x2: 20, y2: 17 }),
        e('circle', { key: 4, cx: 15, cy: 7, r: 2.3, fill: '#0c0e10' }),
        e('circle', { key: 5, cx: 9, cy: 12, r: 2.3, fill: '#0c0e10' }),
        e('circle', { key: 6, cx: 14, cy: 17, r: 2.3, fill: '#0c0e10' })
      ], s),
      theme: (s) => ic([
        e('circle', { key: 1, cx: 12, cy: 12, r: 4 }),
        e('line', { key: 2, x1: 12, y1: 3, x2: 12, y2: 5 }),
        e('line', { key: 3, x1: 12, y1: 19, x2: 12, y2: 21 }),
        e('line', { key: 4, x1: 3, y1: 12, x2: 5, y2: 12 }),
        e('line', { key: 5, x1: 19, y1: 12, x2: 21, y2: 12 }),
        e('line', { key: 6, x1: 5.6, y1: 5.6, x2: 7, y2: 7 }),
        e('line', { key: 7, x1: 17, y1: 17, x2: 18.4, y2: 18.4 })
      ], s)
    };
    const active = this.props.active || 'hoy';
    const defs = [
      { key: 'coach', label: 'Coach' },
      { key: 'hoy', label: 'Hoy' },
      { key: 'rutina', label: 'Rutina' },
      { key: 'semana', label: 'Semana' },
      { key: 'equipo', label: 'Equipo' },
      { key: 'progreso', label: 'Progreso' }
    ];
    const items = defs.map((d) => {
      const on = d.key === active;
      const rowStyle = on
        ? 'display:flex;align-items:center;gap:13px;padding:10px 13px;border-radius:11px;background:rgba(95,227,161,0.13);cursor:pointer;'
        : 'display:flex;align-items:center;gap:13px;padding:10px 13px;border-radius:11px;cursor:pointer;';
      const labelStyle = on
        ? 'color:' + hi + ';font-size:14.5px;font-weight:600;letter-spacing:-0.01em;'
        : 'color:' + dim + ';font-size:14.5px;font-weight:500;letter-spacing:-0.01em;';
      return { key: d.key, label: d.label, rowStyle: rowStyle, labelStyle: labelStyle, iconEl: glyph[d.key](on ? accent : dim) };
    });
    const aOn = active === 'ajustes';
    return {
      items: items,
      ajustesRow: aOn
        ? 'display:flex;align-items:center;gap:13px;padding:10px 13px;border-radius:11px;background:rgba(95,227,161,0.13);cursor:pointer;'
        : 'display:flex;align-items:center;gap:13px;padding:10px 13px;border-radius:11px;cursor:pointer;',
      ajustesLabel: aOn ? 'color:' + hi + ';font-size:14.5px;font-weight:600;' : 'color:' + dim + ';font-size:14.5px;font-weight:500;',
      ajustesIcon: glyph.ajustes(aOn ? accent : dim),
      themeIcon: glyph.theme(dim)
    };
  }
}
</script>
</body>
</html>
